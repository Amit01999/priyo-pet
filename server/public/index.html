<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Priyo Pet & Vet Care API</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #EFFDF0;
      color: #1a3d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(26, 61, 26, 0.05);
      border: 1px solid rgba(26, 61, 26, 0.05);
      max-width: 400px;
    }
    h1 {
      margin-top: 0;
      color: #E86A10;
      font-size: 24px;
    }
    p {
      color: #1a3d1a;
      opacity: 0.7;
      line-height: 1.5;
    }
    .status {
      display: inline-block;
      background-color: #EFFDF0;
      color: #1a3d1a;
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 14px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Priyo Pet API</h1>
    <p>The backend appointment booking system for Priyo Pet & Vet Care campaigns is active.</p>
    <div class="status">● Server Online</div>
  </div>
</body>
</html>
